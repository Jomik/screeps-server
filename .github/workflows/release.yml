name: "Release"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish Latest Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          draft=$(gh api "repos/$GITHUB_REPOSITORY/releases" --paginate --jq '[.[] | select(.draft == true)] | sort_by(.created_at) | last | .id')
          if [ -n "$draft" ] && [ "$draft" != "null" ]; then
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$draft" -F draft=false
            echo "Published release $draft"
          else
            echo "No draft release found"
          fi
