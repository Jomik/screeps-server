name: Deploy Images to GHCR

env:
  REGISTRY: ghcr.io

on:
  push:
    branches:
      - main
  release:
    types:
      - published

  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        imageName:
          - ${{ github.repository }}
        node: [22, 24]
        platform:
          - pair: linux/amd64
            runner: ubuntu-latest
            slug: linux-amd64
          - pair: linux/arm64
            runner: ubuntu-24.04-arm
            slug: linux-arm64
    permissions:
      contents: read
      packages: write
    steps:
      - id: image-ref
        name: Image ref from matrix
        run: |
          set -euo pipefail
          img=$(echo '${{ matrix.imageName }}' | tr '[:upper:]' '[:lower:]')
          slug=$(echo '${{ matrix.imageName }}' | tr '/' '-')
          echo "push_image=${REGISTRY}/${img}" >> "$GITHUB_OUTPUT"
          echo "image_slug=${slug}" >> "$GITHUB_OUTPUT"
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Extract metadata (labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.image-ref.outputs.push_image }}
          github-token: ${{ github.token }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: server
          build-args: |
            NODE_VERSION=${{ matrix.node }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platform.pair }}
          outputs: type=image,"name=${{ steps.image-ref.outputs.push_image }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ steps.image-ref.outputs.image_slug }}-node${{ matrix.node }}-${{ matrix.platform.slug }}
          cache-to: type=gha,scope=build-${{ steps.image-ref.outputs.image_slug }}-node${{ matrix.node }}-${{ matrix.platform.slug }},mode=max
      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "$RUNNER_TEMP/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ steps.image-ref.outputs.image_slug }}-node${{ matrix.node }}-${{ matrix.platform.slug }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        imageName:
          - ${{ github.repository }}
        node: [22, 24]
    permissions:
      contents: read
      packages: write
    steps:
      - id: image-ref
        name: Image ref from matrix
        run: |
          set -euo pipefail
          img=$(echo '${{ matrix.imageName }}' | tr '[:upper:]' '[:lower:]')
          slug=$(echo '${{ matrix.imageName }}' | tr '/' '-')
          echo "push_image=${REGISTRY}/${img}" >> "$GITHUB_OUTPUT"
          echo "image_slug=${slug}" >> "$GITHUB_OUTPUT"
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ steps.image-ref.outputs.image_slug }}-node${{ matrix.node }}-*
          merge-multiple: true
      - name: Log in to the Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ steps.image-ref.outputs.push_image }}
          github-token: ${{ github.token }}
          flavor: |
            latest=auto
            suffix=${{ matrix.node != 24 && format('-node{0}', matrix.node) || '' }},onlatest=true
          tags: |
            type=edge,branch=main
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha
      - name: Create multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.image-ref.outputs.push_image }}@sha256:%s ' *)
      - name: Inspect image
        run: |
          set -euo pipefail
          docker buildx imagetools inspect \
            $(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
