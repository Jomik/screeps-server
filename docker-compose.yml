# Stable project name so `docker compose` run from the backup-tool container
# (cwd /workspace) targets the same stack as on the host. Override with COMPOSE_PROJECT_NAME if needed.
name: ${COMPOSE_PROJECT_NAME:-screeps-server}

services:
  screeps:
    image: ghcr.io/jomik/screeps-server:edge
    depends_on:
      - mongo
      - redis
    ports:
      - 21025:21025/tcp
    volumes:
      - ./config.yml:/screeps/config.yml
      - screeps-user:/home/node
      - screeps-data:/data
      - screeps-mods:/screeps/mods
    environment:
      MONGO_HOST: mongo
      REDIS_HOST: redis
      STEAM_KEY: ${STEAM_KEY:?"Missing steam key"}
    restart: unless-stopped
    build: server

  backup-tool:
    profiles: ["tools"]
    image: ghcr.io/jomik/screeps-server-backup-tool:edge
    build:
      context: ./backup-tool
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:rw
    working_dir: /workspace
    environment:
      WORKSPACE_DIR: /workspace
      # Optional: host repo path for nested bind mounts. If unset, backup-tool infers it from the /workspace mount.
      HOST_WORKSPACE: ${HOST_WORKSPACE:-}
      STEAM_KEY: ${STEAM_KEY:-}

  mongo:
    image: mongo:4.4.30
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  screeps-data:
  screeps-mods:
  screeps-user:
  redis-data:
  mongo-data:
